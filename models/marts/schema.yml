        tests:
          - not_null
      - name: piano_key
        tests:
          - not_null
      - name: metodo_key
        tests:
          - not_null

  - name: flat_ordini
    columns:
      - name: transazione_id
        tests:
          - unique
          - not_null
      - name: piano_nome
        tests:
          - not_null
