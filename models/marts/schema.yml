        tests:
          - unique
          - not_null
      - name: piano_nome
        tests:
          - not_null

  - name: dim_metodi
    columns:
      - name: metodo_key
        tests:
          - unique
          - not_null
      - name: metodo_nome
        tests:
          - not_null

  - name: dim_coupon
    columns:
      - name: coupon_key
        tests:
          - unique
          - not_null

  - name: fct_transazioni
    columns:
      - name: transazione_id
        tests:
          - unique
          - not_null
